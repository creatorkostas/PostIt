name: Rebuild Latest Release
on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Build and test only — skip uploading to release"
        type: boolean
        default: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Tidy dependencies
        run: go mod tidy

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...

      - name: Cross-compile binaries
        run: |
          mkdir -p dist
          GOOS=linux   GOARCH=amd64 go build -o dist/postit-linux-amd64   ./cmd/postit
          GOOS=linux   GOARCH=arm64 go build -o dist/postit-linux-arm64   ./cmd/postit
          GOOS=windows GOARCH=amd64 go build -o dist/postit-windows-amd64.exe ./cmd/postit
          GOOS=darwin  GOARCH=amd64 go build -o dist/postit-darwin-amd64  ./cmd/postit
          GOOS=darwin  GOARCH=arm64 go build -o dist/postit-darwin-arm64  ./cmd/postit

      - name: Get latest release tag
        id: latest
        if: ${{ !inputs.dry-run }}
        run: |
          tag=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          if [ -z "$tag" ]; then
            echo "No releases found — skipping upload."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload binaries to latest release
        if: ${{ steps.latest.outputs.found == 'true' }}
        run: |
          echo "Updating release: ${{ steps.latest.outputs.tag }}"
          gh release upload "${{ steps.latest.outputs.tag }}" dist/* --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Summary
        run: |
          echo "## Rebuild complete" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
      - name: Summary - dry run
        if: ${{ inputs.dry-run }}
        run: |
          echo "| Build + Test | Passed (dry-run -- no upload) |" >> $GITHUB_STEP_SUMMARY
      - name: Summary - uploaded
        if: ${{ !inputs.dry-run && steps.latest.outputs.found == 'true' }}
        run: |
          echo "| Build + Test | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Upload to ${{ steps.latest.outputs.tag }} | Done |" >> $GITHUB_STEP_SUMMARY
      - name: Summary - no release
        if: ${{ !inputs.dry-run && steps.latest.outputs.found != 'true' }}
        run: |
          echo "| Build + Test | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Upload | Skipped -- no releases found |" >> $GITHUB_STEP_SUMMARY
