name: Go Build & Release
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
permissions:
  contents: write
jobs:
  # --- PR checks: build + test + lint + cross-compile check ---
  check:
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    - name: Lint
      if: runner.os == 'Linux'
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest
    - name: Govulncheck
      continue-on-error: true
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@latest
        govulncheck ./...
    - name: Build
      run: go build -v ./...
    - name: Cross-compile check
      if: runner.os == 'Linux'
      run: |
        GOOS=linux   GOARCH=arm64 go build -o /tmp/cross-check ./cmd/postit
        GOOS=windows GOARCH=amd64 go build -o /tmp/cross-check ./cmd/postit
        GOOS=darwin  GOARCH=amd64 go build -o /tmp/cross-check ./cmd/postit
        GOOS=darwin  GOARCH=arm64 go build -o /tmp/cross-check ./cmd/postit
    - name: Test with coverage
      run: go test -v -coverprofile=coverage.out ./...
    - name: Upload coverage artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage-${{ runner.os }}-${{ github.sha }}
        path: coverage.out
  # --- Push to main: build + test + minor release ---
  release:
    if: github.event_name == 'push' && github.ref_name == 'main'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    - name: Build
      run: go build -v ./...
    - name: Test with coverage
      run: go test -v -coverprofile=coverage.out ./...
    - name: Upload coverage artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage-${{ github.sha }}
        path: coverage.out
    - name: Bump minor version
      id: tag
      run: |
        latest=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
        version="${latest#v}"
        IFS='.' read -r major minor patch <<< "$version"
        new_minor=$((minor + 1))
        new_tag="v${major}.${new_minor}.0"
        echo "new_tag=$new_tag" >> "$GITHUB_OUTPUT"
    - name: Create tag
      run: |
        git tag ${{ steps.tag.outputs.new_tag }}
        git push origin ${{ steps.tag.outputs.new_tag }}
    - name: Build binaries
      run: |
        mkdir -p dist
        GOOS=linux   GOARCH=amd64 go build -o dist/postit-linux-amd64   ./cmd/postit
        GOOS=linux   GOARCH=arm64 go build -o dist/postit-linux-arm64   ./cmd/postit
        GOOS=windows GOARCH=amd64 go build -o dist/postit-windows-amd64.exe ./cmd/postit
        GOOS=darwin  GOARCH=amd64 go build -o dist/postit-darwin-amd64  ./cmd/postit
        GOOS=darwin  GOARCH=arm64 go build -o dist/postit-darwin-arm64  ./cmd/postit
    - name: Generate release notes
      id: notes
      run: |
        prev=$(git tag --sort=-version:refname | head -2 | tail -1 || echo "")
        if [ -z "$prev" ]; then
          echo "Initial release." > release_notes.txt
        else
          git shortlog "$prev".."${{ steps.tag.outputs.new_tag }}" > release_notes.txt
        fi
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.new_tag }}
        name: ${{ steps.tag.outputs.new_tag }}
        body_path: release_notes.txt
        files: dist/*
