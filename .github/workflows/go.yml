name: Go Build & Release
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
permissions:
  contents: write
jobs:
  # --- PR checks: just build + test, no release ---
  check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
    - name: Build
      run: go build -v ./...
    - name: Test
      run: go test -v ./...
  # --- Push to main: build + test + minor release ---
  release:
    if: github.event_name == 'push' && github.ref_name == 'main'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0          # needed to see all tags
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
    - name: Build
      run: go build -v ./...
    - name: Test
      run: go test -v ./...
    - name: Bump minor version
      id: tag
      run: |
        # get latest tag or default to v0.0.0
        latest=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
        # strip the leading v
        version="${latest#v}"
        # split into major.minor.patch
        IFS='.' read -r major minor patch <<< "$version"
        # bump minor, reset patch
        new_minor=$((minor + 1))
        new_tag="v${major}.${new_minor}.0"
        echo "new_tag=$new_tag" >> "$GITHUB_OUTPUT"
    - name: Create tag
      run: |
        git tag ${{ steps.tag.outputs.new_tag }}
        git push origin ${{ steps.tag.outputs.new_tag }}
    - name: Build binaries
      run: |
        mkdir -p dist
        GOOS=linux   GOARCH=amd64 go build -o dist/postit-linux-amd64   ./cmd/postit
        GOOS=linux   GOARCH=arm64 go build -o dist/postit-linux-arm64   ./cmd/postit
        GOOS=windows GOARCH=amd64 go build -o dist/postit-windows-amd64.exe ./cmd/postit
        GOOS=darwin  GOARCH=amd64 go build -o dist/postit-darwin-amd64  ./cmd/postit
        GOOS=darwin  GOARCH=arm64 go build -o dist/postit-darwin-arm64  ./cmd/postit
    - name: Generate release notes
      id: notes
      run: |
        prev_tag="${{ steps.tag.outputs.new_tag }}"
        # get the tag before this one for changelog
        prev=$(git tag --sort=-version:refname | head -2 | tail -1 || echo "")
        if [ -z "$prev" ]; then
          notes="Initial release."
        else
          notes=$(git log --oneline --no-decorate "$prev".."${{ steps.tag.outputs.new_tag }}")
        fi
        # write to file to avoid multiline issues
        echo "$notes" > release_notes.txt
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.new_tag }}
        name: ${{ steps.tag.outputs.new_tag }}
        body_path: release_notes.txt
        files: dist/*
